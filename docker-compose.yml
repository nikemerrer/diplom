x-ollama-model: &ollama_model ${MODEL_ID:-qwen2.5:1.5b}

services:
  ollama:
    build: ./ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      MODEL_ID: *ollama_model
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: fastapi_app
    command: >-
      sh -c "echo '➡️  Открыть приложение: http://localhost:8000' &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL_ID: *ollama_model
      TEMPERATURE: 0.0
      OLLAMA_TIMEOUT: 120
      OLLAMA_NUM_CTX: 4096
      OLLAMA_NUM_PREDICT_CHUNK: 420
      OLLAMA_NUM_PREDICT_VERIFY: 520
      CHUNK_SIZE: 2200
      CHUNK_OVERLAP: 320
      HEADER_FOCUS_CHARS: 2600
      MAX_CHUNKS: 10
      VERIFY_ENABLED: 1
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama-data:
